[agent]
max_iterations = 10
max_tool_calls_per_iteration = 4
consolidation_threshold = 40
context_cache_ttl_secs = 60

[llm]
provider = "openai_compatible"
api_key_env = "OPENAI_API_KEY"
model = "gpt-4o-mini"
base_url = "https://api.openai.com"
max_tokens = 1024
temperature = 0.7
timeout_secs = 60

# Optional fallback provider (e.g., local Ollama)
# [llm.fallback]
# provider = "openai_compatible"
# base_url = "http://localhost:11434"
# model = "qwen3:0.6b"
# api_key_env = ""

[server]
http_enabled = true
http_port = 3001
http_bind = "0.0.0.0"
mqtt_enabled = false

[cron]
enabled = true
check_interval_secs = 60

[heartbeat]
enabled = true
interval_secs = 1800

[tools]
shell_enabled = true
shell_allowed_commands = ["ls", "cat", "date", "df", "free", "uptime", "ping", "wc", "ifconfig", "hostname", "whoami", "uname", "curl"]
shell_timeout_secs = 10
http_fetch_enabled = true
http_fetch_timeout_secs = 15

[logging]
level = "info"
